databaseChangeLog:
  - changeSet:
      id: 1-create-user-organization-permissions
      author: refactoring-agent
      comments: Create user_organization_permissions table
      changes:
        - createTable:
            tableName: user_organization_permissions
            remarks: Junction table for fine-grained permissions
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_organization_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_org_perm_user_org
                    references: user_organizations(id)
                    deleteCascade: true
              - column:
                  name: permission
                  type: varchar(50)
                  constraints:
                    nullable: false
              - column:
                  name: granted_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: granted_by
                  type: uuid
                  remarks: User who granted this permission
              - column:
                  name: expires_at
                  type: timestamp
                  remarks: Optional expiration date for temporary permissions

        - addUniqueConstraint:
            tableName: user_organization_permissions
            columnNames: user_organization_id, permission
            constraintName: uk_user_org_permission

        - createIndex:
            tableName: user_organization_permissions
            indexName: idx_user_org_perm_user_org
            columns:
              - column:
                  name: user_organization_id

        - createIndex:
            tableName: user_organization_permissions
            indexName: idx_user_org_perm_permission
            columns:
              - column:
                  name: permission