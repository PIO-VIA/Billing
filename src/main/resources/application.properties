spring.mail.password=fsez ivwg pzzu fjae

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- URL de base de l'application ---
app.base-url=${APP_BASE_URL:http://localhost:8080}

# --- Adresse du serveur Kafka ---
spring.kafka.bootstrap-servers=localhost:9092

# --- Configuration du Producer ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# --- Configuration du Consumer ---
spring.kafka.consumer.group-id=my-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.admin.auto-create=true

# --- Cache Configuration (Caffeine) ---
spring.cache.type=caffeine
spring.cache.cache-names=clients,produits,taxes,factures,devis,fournisseurs,banques,stocks,paiements
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=10m

# --- Actuator & Metrics ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true
management.metrics.enable.cache=true
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true



comops.core.backend_ip=localhost:8081
comops.accounting_back.ip=10.205.243.11:8081
comops.core.products=localhost:3002


#---redis conf
# --- Redis Configuration ---
spring.data.redis.host=localhost
spring.data.redis.port=6379
# If using a password:
# spring.data.redis.password=your_password
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2

# --- Kafka Configuration ---

# Allow mapping of JSON to your DTOs
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.account.modules.*
spring.main.web-application-type=reactive

